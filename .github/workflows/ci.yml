name: Java Autograding Directo

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Compilar y Correr Tests Manualmente
        run: |
          # 1. Creamos una carpeta para los archivos compilados
          mkdir -p bin
          
          # 2. Descargamos JUnit (el motor de pruebas) directamente
          wget https://repo1.maven.org/maven2/junit/junit/4.13.2/junit-4.13.2.jar
          wget https://repo1.maven.org/maven2/org/hamcrest/hamcrest-core/1.3/hamcrest-core-1.3.jar

          # 3. Compilamos tu código y el test
          javac -d bin src/main/java/Workshop.java
          javac -d bin -cp bin:junit-4.13.2.jar src/test/java/WorkshopTest.java

          # 4. Ejecutamos las pruebas
          java -cp bin:junit-4.13.2.jar:hamcrest-core-1.3.jar org.junit.runner.JUnitCore WorkshopTest
