name: Java Autograding

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile and Run Tests
        run: |
          # Compilamos el taller y los tests (buscamos donde estén)
          javac src/main/java/Workshop.java
          
          # Si el comando anterior falla, intentaremos compilar todo el proyecto
          # Esto forzará a que los tests se ejecuten manualmente si Maven no está configurado
          mvn test -DfailIfNoTests=false
