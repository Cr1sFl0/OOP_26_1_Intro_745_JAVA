name: Java CI  # Nombre del flujo

on: [push]    # Se activa cada vez que subes algo (push)

jobs:
  build:
    runs-on: ubuntu-latest  # Usa una computadora con Linux en la nube

    steps:
      - uses: actions/checkout@v4  # Descarga tu código

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Compile Java
        run: |
          # IMPORTANTE: Aquí debemos entrar a la carpeta donde está tu Workshop.java
          # Según tu imagen, la ruta parece ser:
          cd src/main/java
          javac Workshop.java
